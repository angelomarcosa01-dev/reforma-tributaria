<script>
  let ANTHROPIC_KEY = "";
  function saveKey() {
    const val = document.getElementById("api-key-input").value.trim();
    if (!val.startsWith("sk-")) {
      alert("Chave inválida. Deve começar com sk-ant-...");

    document.getElementById("api-modal").classList.add("hidden");

  document.getElementById("api-key-input").addEventListener("keydown", e => {
    if (e.key === "Enter") saveKey();

<script type="text/babel">
const { useState, useRef, useEffect } = React;

const SYSTEM_PROMPT = `Você é um especialista tributário brasileiro especializado na Nova Reforma Tributária (Emenda Constitucional 132/2023 e legislação complementar). Seu papel é auxiliar contadores, empresários e colaboradores a entender e aplicar as mudanças trazidas pela reforma.

BASE DE CONHECIMENTO — REFORMA TRIBUTÁRIA BRASILEIRA:

## VISÃO GERAL
A Reforma Tributária foi aprovada pela EC 132/2023 e representa a maior mudança no sistema tributário brasileiro desde 1988. O objetivo é simplificar o sistema, reduzir litígios, aumentar transparência e melhorar o ambiente de negócios.

## TRIBUTOS EXTINTOS
- PIS (Programa de Integração Social)
- COFINS (Contribuição para o Financiamento da Seguridade Social)
- IPI (Imposto sobre Produtos Industrializados) — extinto parcialmente
- ICMS (Imposto sobre Circulação de Mercadorias e Serviços) — estadual
- ISS (Imposto sobre Serviços) — municipal

## NOVOS TRIBUTOS CRIADOS

### IBS — Imposto sobre Bens e Serviços
- Substitui: ICMS + ISS
- Competência: Estados e Municípios (gerido pelo Comitê Gestor do IBS)
- Incidência: consumo de bens e serviços
- Não cumulativo pleno
- Alíquota de referência: definida pelo Comitê Gestor
- Destinado ao destino (local onde o consumidor está)

### CBS — Contribuição sobre Bens e Serviços
- Substitui: PIS + COFINS
- Competência: União Federal
- Incidência: consumo de bens e serviços
- Não cumulativo pleno
- Alíquota estimada: ~8,8% (a confirmar em lei complementar)

### IS — Imposto Seletivo ("Imposto do Pecado")
- Competência: União Federal
- Incidência: bens e serviços prejudiciais à saúde ou ao meio ambiente
- Exemplos: cigarros, bebidas alcoólicas, veículos poluentes, apostas
- Não gera crédito para aproveitamento

### IPI Residual
- Mantido apenas para proteger a Zona Franca de Manaus
- Incide apenas sobre produtos que concorram com produção da ZFM

## PERÍODO DE TRANSIÇÃO
- 2026: início da cobrança do CBS e IBS com alíquotas reduzidas (teste): CBS 0,9% | IBS 0,1%
- 2027: extinção do PIS e COFINS; CBS passa a vigorar plenamente; IPI reduzido
- 2029–2032: redução gradual do ICMS e ISS (25% ao ano)
- 2033: extinção total do ICMS e ISS; IBS e CBS em pleno vigor
- Período total: aproximadamente 7 anos (2026–2033)

## REGIMES ESPECÍFICOS
- Saúde, educação, transporte coletivo: alíquota zero
- Profissionais liberais: redução de 30% a 60% na alíquota
- Agronegócio: alíquota zero em produção básica e insumos
- Cooperativas: regime especial
- Zona Franca de Manaus: manutenção dos benefícios com IPI residual
- Simples Nacional: mantido; opção de recolher IBS/CBS fora do Simples

## CRÉDITOS TRIBUTÁRIOS
- Crédito financeiro amplo: todas as aquisições da atividade
- Prazo de ressarcimento: 60 dias (CBS)
- Fim dos créditos físicos limitados do sistema atual
- Saldos de ICMS acumulados: aproveitamento gradual na transição

## CASHBACK
- Devolução de IBS e CBS para famílias cadastradas no CadÚnico
- 100% no gás de cozinha e energia elétrica (até limite)

## COMITÊ GESTOR DO IBS
- Administração unificada do IBS por representantes de estados e municípios
- Uniformiza alíquotas, regras e fiscalização

## IMPACTOS PARA CONTABILIDADE
1. Escrituração unificada de IBS e CBS
2. NF-e adaptada ao novo modelo
3. Fim da guerra fiscal entre estados
4. Simplificação de obrigações acessórias
5. Alíquotas visíveis na nota ao consumidor

Responda sempre em português brasileiro. Seja claro e didático. Use exemplos práticos. Adapte o nível técnico ao perfil do usuário.`;

  "Quando a reforma começa a valer?",

// ── Components ──────────────────────────────────────────

function TypingDots() {
  return (
    <div style={{ display:"flex", gap:5, padding:"14px 18px", alignItems:"center" }}>
      {[0,1,2].map(i => (
        <div key={i} style={{
          width:8, height:8, borderRadius:"50%", background:"#6366f1",
          animation:`bounce 1.2s ${i*0.2}s ease-in-out infinite`,
        }}/>
      ))}

  );
}

function Tag({ area }) {
  const MAP = {
    fiscal:   { bg:"#edf3fb", text:"#2d5a9e", border:"#a5c0e5" },
    contabil: { bg:"#eafaf3", text:"#1a7a4e", border:"#80d0a8" },
    dp:       { bg:"#fdf0e8", text:"#9a3e14", border:"#e0a880" },
    apoio:    { bg:"#f3eefa", text:"#5a2e90", border:"#c0a0e0" },
  };
  const c = MAP[area] || MAP.apoio;
  return (
    <span style={{
      fontSize:10, fontWeight:600, letterSpacing:"0.8px", textTransform:"uppercase",
      background:c.bg, color:c.text, border:`1px solid ${c.border}`,
      padding:"3px 9px", borderRadius:20, whiteSpace:"nowrap",
    }}>{area}</span>
  );
}

      borderRadius: 12, padding: "10px 16px", cursor: "pointer",
      display: "flex", alignItems: "center", gap: 8,
      transition: "all 0.2s",

      fontSize: 13, fontWeight: 600,

// ── Main App ─────────────────────────────────────────────

function App() {
  const [tab,        setTab]     = useState("conteudo");
  const [topic,      setTopic]   = useState("visao");
  const [messages,   setMessages]= useState([{
    role:"assistant",
    content:"Olá! 👋 Sou seu especialista em Reforma Tributária. Posso esclarecer dúvidas sobre IBS, CBS, Imposto Seletivo, o cronograma de transição, regimes especiais e muito mais.\n\nComo posso te ajudar hoje?",
  }]);
  const [input,   setInput]   = useState("");
  const [loading, setLoading] = useState(false);
  const chatEndRef = useRef(null);

  useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior:"smooth" }); }, [messages, loading]);

  const send = async (text) => {
    const msg = text || input.trim();
    if (!msg || loading) return;
    setInput("");
    const userMsg = { role:"user", content:msg };
    const history = [...messages, userMsg];
    setMessages(history);
    setLoading(true);
    setTab("chat");

    if (!window.ANTHROPIC_KEY) {
      setTimeout(() => {
        setMessages(prev => [...prev, { role:"assistant", content:"⚠️ Chave de API não encontrada. Recarregue a página e insira sua chave da Anthropic." }]);
        setLoading(false);
      }, 500);
      return;
    }

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key": window.ANTHROPIC_KEY,
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          system: SYSTEM_PROMPT,
          messages: history.map(m => ({ role:m.role, content:m.content })),
        }),
      });
      const data = await res.json();
      const reply = data.content?.map(b => b.text).join("") || "Não consegui processar. Tente novamente.";
      setMessages(prev => [...prev, { role:"assistant", content:reply }]);
    } catch(e) {
      setMessages(prev => [...prev, { role:"assistant", content:"Erro de conexão. Verifique sua internet e tente novamente." }]);
    }
    setLoading(false);
  };

  const handleKey = e => { if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); send(); } };

  const SidebarQuestions = () => (
    <div style={{
      background:"#fff", borderRadius:16, padding:"16px 18px",
      boxShadow:"0 1px 4px rgba(0,0,0,0.06)", border:"1px solid #e5e7eb",
    }}>
      <div style={{ fontSize:12, fontWeight:700, color:"#6b7280", letterSpacing:"1px", textTransform:"uppercase", marginBottom:12 }}>
        💡 Perguntas Rápidas
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:7 }}>
        {QUICK_QUESTIONS.map((q, i) => (
          <button key={i} onClick={() => send(q)} style={{
            background:"#f5f3ff", color:"#4338ca", border:"1px solid #e0e7ff",
            borderRadius:10, padding:"9px 12px", fontSize:12, fontWeight:500,
            cursor:"pointer", textAlign:"left", lineHeight:1.4,
            fontFamily:"'DM Sans', sans-serif", transition:"background 0.15s",
          }}
            onMouseEnter={e => e.currentTarget.style.background="#ede9fe"}
            onMouseLeave={e => e.currentTarget.style.background="#f5f3ff"}
          >{q}</button>
        ))}
      </div>
    </div>
  );

  return (
    <div style={{ minHeight:"100vh", background:"#f8f9fe", fontFamily:"'DM Sans', sans-serif" }}>

      {/* HEADER */}
      <div style={{
        background:"linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#4338ca 100%)",
        padding:"20px 24px 0", position:"relative", overflow:"hidden",
      }}>
        {[300,200,150].map((sz,i) => (
          <div key={i} style={{
            position:"absolute", width:sz, height:sz, borderRadius:"50%",
            border:"1px solid rgba(255,255,255,0.07)",
            top:[-80,-40,20][i], right:[i*80][0]||i*110,
            pointerEvents:"none",
          }}/>
        ))}
        <div style={{ maxWidth:1100, margin:"0 auto" }}>
          <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:10 }}>
            <div style={{
              width:44, height:44, borderRadius:12,
              background:"rgba(255,255,255,0.15)",
              display:"flex", alignItems:"center", justifyContent:"center",
              fontSize:22, backdropFilter:"blur(8px)",
            }}>⚖️</div>
            <div>
              <div style={{ fontSize:11, color:"rgba(255,255,255,0.6)", letterSpacing:"2px", textTransform:"uppercase", fontWeight:600 }}>
                Alves Contabilidade
              </div>
              <h1 style={{
                fontFamily:"'Playfair Display', serif",
                fontSize:"clamp(18px,3.5vw,26px)", color:"#fff", margin:0, lineHeight:1.2,
              }}>
                Reforma Tributária <span style={{ color:"#a5b4fc" }}>EC 132/2023</span>
              </h1>
            </div>
          </div>
          <p style={{ color:"rgba(255,255,255,0.65)", fontSize:13, marginBottom:18 }}>
            Plataforma de consulta, interpretação e treinamento
          </p>
          <div style={{ display:"flex", gap:0 }}>
            {[{id:"conteudo",label:"📚 Conteúdo"},{id:"chat",label:"💬 Assistente IA"}].map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{
                padding:"10px 22px",
                background: tab === t.id ? "#fff" : "transparent",
                color: tab === t.id ? "#4338ca" : "rgba(255,255,255,0.7)",
                border:"none", borderRadius:"10px 10px 0 0",
                fontSize:13, fontWeight:600, cursor:"pointer",
                transition:"all 0.2s", fontFamily:"'DM Sans', sans-serif",
              }}>{t.label}</button>
            ))}
          </div>
        </div>
      </div>

      {/* BODY */}
      <div style={{ maxWidth:1100, margin:"0 auto", padding:"0 16px 40px" }}>

        {/* ── CONTEÚDO ── */}
        {tab === "conteudo" && (
          <div style={{ animation:"fadeSlide 0.3s ease" }}>
            <div style={{ display:"flex", gap:10, flexWrap:"wrap", padding:"20px 0 18px", overflowX:"auto" }}>
              {TOPICS.map(t => <TopicBtn key={t.id} topic={t} isActive={topic===t.id} onClick={setTopic}/>)}
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"minmax(0,1fr) 300px", gap:20 }}>
              <div style={{
                background:"#fff", borderRadius:16, padding:"24px 28px",
                boxShadow:"0 1px 4px rgba(0,0,0,0.06)", border:"1px solid #e5e7eb",
              }}>
                <ContentPanel topicId={topic}/>
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
                <SidebarQuestions/>
                <div style={{
                  background:"linear-gradient(135deg,#1e1b4b,#4338ca)",
                  borderRadius:16, padding:"18px 20px", color:"#fff",
                }}>
                  <div style={{ fontSize:12, fontWeight:700, letterSpacing:"1px", textTransform:"uppercase", color:"rgba(255,255,255,0.6)", marginBottom:12 }}>
                    📅 Status da Reforma
                  </div>
                  {[
                    { label:"Aprovação EC 132",   status:"✅ Concluído" },
                    { label:"CBS/IBS 2026",        status:"🟡 Em 2026" },
                    { label:"Extinção PIS/COFINS", status:"🟡 Em 2027" },
                    { label:"Extinção ICMS/ISS",   status:"🟡 Em 2033" },
                  ].map((item, i, arr) => (
                    <div key={i} style={{
                      display:"flex", justifyContent:"space-between", alignItems:"center",
                      padding:"7px 0", fontSize:12,
                      borderBottom: i < arr.length-1 ? "1px solid rgba(255,255,255,0.1)" : "none",
                    }}>
                      <span style={{ color:"rgba(255,255,255,0.8)" }}>{item.label}</span>
                      <span style={{ fontWeight:600, fontSize:11 }}>{item.status}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ── CHAT ── */}
        {tab === "chat" && (
          <div style={{ animation:"fadeSlide 0.3s ease", paddingTop:20 }}>
            <div style={{
              display:"grid", gridTemplateColumns:"minmax(0,1fr) 260px", gap:20,
              height:"calc(100vh - 230px)", minHeight:480,
            }}>
              {/* Chat box */}
              <div style={{
                background:"#fff", borderRadius:16,
                boxShadow:"0 1px 4px rgba(0,0,0,0.06)", border:"1px solid #e5e7eb",
                display:"flex", flexDirection:"column", overflow:"hidden",
              }}>
                {/* header */}
                <div style={{ padding:"14px 20px", borderBottom:"1px solid #f3f4f6", display:"flex", alignItems:"center", gap:12 }}>
                  <div style={{
                    width:36, height:36, borderRadius:"50%",
                    background:"linear-gradient(135deg,#4f46e5,#7c3aed)",
                    display:"flex", alignItems:"center", justifyContent:"center", fontSize:16,
                  }}>⚖️</div>
                  <div>
                    <div style={{ fontSize:13, fontWeight:700, color:"#111827" }}>Especialista Tributário IA</div>
                    <div style={{ fontSize:11, color:"#10b981", fontWeight:600 }}>● Online — EC 132/2023</div>
                  </div>
                </div>
                {/* messages */}
                <div style={{ flex:1, overflowY:"auto", padding:"18px 20px" }}>
                  {messages.map((m, i) => <ChatMsg key={i} msg={m}/>)}
                  {loading && (
                    <div style={{ display:"flex", justifyContent:"flex-start", marginBottom:14 }}>
                      <div style={{
                        width:32, height:32, borderRadius:"50%",
                        background:"linear-gradient(135deg,#4f46e5,#7c3aed)",
                        display:"flex", alignItems:"center", justifyContent:"center",
                        fontSize:14, color:"#fff", flexShrink:0, marginRight:10, marginTop:2,
                      }}>⚖️</div>
                      <div style={{ background:"#fff", border:"1px solid #f3f4f6", borderRadius:"18px 18px 18px 4px", boxShadow:"0 1px 6px rgba(0,0,0,0.08)" }}>
                        <TypingDots/>
                      </div>
                    </div>
                  )}
                  <div ref={chatEndRef}/>
                </div>
                {/* input */}
                <div style={{ padding:"14px 16px", borderTop:"1px solid #f3f4f6", display:"flex", gap:10, alignItems:"flex-end" }}>
                  <textarea
                    value={input}
                    onChange={e => setInput(e.target.value)}
                    onKeyDown={handleKey}
                    placeholder="Pergunte sobre IBS, CBS, transição, créditos..."
                    rows={2}
                    style={{
                      flex:1, resize:"none", border:"1.5px solid #e5e7eb", borderRadius:12,
                      padding:"10px 14px", fontSize:13, color:"#111827",
                      fontFamily:"'DM Sans', sans-serif", background:"#f9fafb", lineHeight:1.5,
                    }}
                    onFocus={e => e.target.style.borderColor="#6366f1"}
                    onBlur={e => e.target.style.borderColor="#e5e7eb"}
                  />
                  <button
                    onClick={() => send()}
                    disabled={loading || !input.trim()}
                    style={{
                      width:42, height:42, borderRadius:12, border:"none",
                      background: loading||!input.trim() ? "#e5e7eb" : "linear-gradient(135deg,#4f46e5,#6366f1)",
                      color: loading||!input.trim() ? "#9ca3af" : "#fff",
                      cursor: loading||!input.trim() ? "not-allowed" : "pointer",
                      fontSize:18, display:"flex", alignItems:"center", justifyContent:"center",
                      flexShrink:0, transition:"all 0.2s",
                      boxShadow: !loading&&input.trim() ? "0 4px 12px rgba(99,102,241,0.35)" : "none",
                    }}
                  >↑</button>
                </div>
              </div>

              {/* sidebar */}
              <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
                <SidebarQuestions/>
                <div style={{
                  background:"#fff", borderRadius:16, padding:"16px 18px",
                  boxShadow:"0 1px 4px rgba(0,0,0,0.06)", border:"1px solid #e5e7eb",
                  fontSize:12, color:"#6b7280", lineHeight:1.6,
                }}>
                  <div style={{ fontWeight:700, color:"#374151", marginBottom:6 }}>ℹ️ Sobre o assistente</div>
                  Treinado com base na EC 132/2023. Para questões jurídicas específicas, consulte sempre um profissional habilitado.
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// Expose key to React scope via window
Object.defineProperty(window, 'ANTHROPIC_KEY', {
  get: () => window._ak || "",
  set: (v) => { window._ak = v; }
});

// Patch saveKey to set on window
window.saveKey = function() {
  const val = document.getElementById("api-key-input").value.trim();
  if (!val.startsWith("sk-")) { alert("Chave inválida. Deve começar com sk-ant-..."); return; }
  window.ANTHROPIC_KEY = val;
  document.getElementById("api-modal").classList.add("hidden");
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
